<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chelsey &amp; Alex · The Menu</title>
<meta name="description" content="Choose your dishes for the wedding of Chelsey and Alex · kindly reply by the thirtieth of July">
<link rel="canonical" href="https://coleswedding.com/menu.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Chelsey &amp; Alex">
<meta property="og:title" content="Chelsey &amp; Alex · The Menu">
<meta property="og:description" content="Kindly choose one dish from each course by the thirtieth of July.">
<meta property="og:url" content="https://coleswedding.com/menu.html">
<meta property="og:image" content="https://coleswedding.com/assets/img/og.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="theme-color" content="#ece7d8">
<link rel="icon" href="/favicon.ico?v=2" sizes="48x48">
<link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2">
<link rel="preload" href="/assets/fonts/italiana-400-latin.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/assets/fonts/cormorant-garamond-400-latin.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/assets/fonts/tenor-sans-400-latin.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="/assets/site.css">
</head>
<body>

<header class="nav">
  <a class="nav-brand" href="/" aria-label="Chelsey and Alex — home">
    <img src="/assets/img/seal-small.png" width="27" height="27" alt="" style="display:block">
    <span>C &amp; A</span>
  </a>
  <nav class="nav-links" aria-label="Site">
    <a href="/">The Invitation</a>
    <a href="/#day">The Day</a>
    <a href="/#venues">Venues</a>
  </nav>
</header>

<main class="menu-wrap">

  <h1 class="menu-title" style="margin:0">The Menu</h1>
  <p class="menu-sub" style="margin-top:10px">kindly choose one dish from each course</p>

  <form id="menu-form" action="https://formspree.io/f/mvzealwq" method="POST">

    <fieldset class="course" style="border:none;padding:0;margin-left:0;margin-right:0">
      <legend style="width:100%;padding:0">
        <div class="course-head">
          <span class="eyebrow">To Begin</span>
          <div class="orn"><span></span></div>
        </div>
      </legend>
      <div class="dishes">
        <label class="dish">
          <input type="radio" name="starter" value="Pugliese burrata" required>
          <span class="dish-card">
            <span class="dish-name">Pugliese burrata<span class="dish-tag">v</span></span>
            <span class="dish-detail" style="display:block">broad beans, olive crumble, mint &amp; lemon dressing</span>
          </span>
        </label>
        <label class="dish">
          <input type="radio" name="starter" value="San Daniele ham">
          <span class="dish-card">
            <span class="dish-name">San Daniele ham</span>
            <span class="dish-detail" style="display:block">compressed melon, creamed ricotta, Madeira reduction</span>
          </span>
        </label>
        <label class="dish">
          <input type="radio" name="starter" value="Beef carpaccio">
          <span class="dish-card">
            <span class="dish-name">Beef carpaccio</span>
            <span class="dish-detail" style="display:block">egg yolk pur&eacute;e, capers, mustard pickle, rocket</span>
          </span>
        </label>
      </div>
    </fieldset>

    <fieldset class="course" style="border:none;padding:0;margin-left:0;margin-right:0">
      <legend style="width:100%;padding:0">
        <div class="course-head">
          <span class="eyebrow">To Follow</span>
          <div class="orn"><span></span></div>
        </div>
      </legend>
      <div class="dishes">
        <label class="dish">
          <input type="radio" name="main" value="Soft herb risotto" required>
          <span class="dish-card">
            <span class="dish-name">Soft herb risotto<span class="dish-tag">v · pb</span></span>
            <span class="dish-detail" style="display:block">parmesan, barrel-aged feta, roasted beetroot</span>
          </span>
        </label>
        <label class="dish">
          <input type="radio" name="main" value="Sutton Hoo chicken breast">
          <span class="dish-card">
            <span class="dish-name">Sutton Hoo chicken breast</span>
            <span class="dish-detail" style="display:block">spring peas, pancetta, girolles, truffle sauce</span>
          </span>
        </label>
        <label class="dish">
          <input type="radio" name="main" value="Beef fillet & ox cheek">
          <span class="dish-card">
            <span class="dish-name">Beef fillet &amp; ox cheek</span>
            <span class="dish-detail" style="display:block">duck fat potato, confit shallot, kale, red wine jus</span>
          </span>
        </label>
      </div>
    </fieldset>

    <fieldset class="course" style="border:none;padding:0;margin-left:0;margin-right:0">
      <legend style="width:100%;padding:0">
        <div class="course-head">
          <span class="eyebrow">To Finish</span>
          <div class="orn"><span></span></div>
        </div>
      </legend>
      <div class="dishes">
        <label class="dish">
          <input type="radio" name="dessert" value="Passion fruit délice" required>
          <span class="dish-card">
            <span class="dish-name">Passion fruit d&eacute;lice<span class="dish-tag">pb</span></span>
            <span class="dish-detail" style="display:block">mango salsa, sorbet</span>
          </span>
        </label>
        <label class="dish">
          <input type="radio" name="dessert" value="Strawberries & cream">
          <span class="dish-card">
            <span class="dish-name">Strawberries &amp; cream</span>
            <span class="dish-detail" style="display:block">shortbread, strawberry sauce</span>
          </span>
        </label>
        <label class="dish">
          <input type="radio" name="dessert" value="Chocolate & lemongrass mousse">
          <span class="dish-card">
            <span class="dish-name">Chocolate &amp; lemongrass mousse</span>
            <span class="dish-detail" style="display:block">raspberry ganache</span>
          </span>
        </label>
      </div>
    </fieldset>

    <div class="field">
      <label class="field-label" for="guest-name">Your name</label>
      <input id="guest-name" name="name" type="text" required autocomplete="name"
             placeholder="So we know whose choices these are">
    </div>
    <div class="field">
      <label class="field-label" for="dietary">Dietary notes</label>
      <input id="dietary" name="dietary" type="text" autocomplete="off"
             placeholder="Allergies, anything the kitchen should know">
    </div>

    <div class="menu-actions">
      <button class="btn" type="submit" id="send-btn">Send my choices</button>
      <p class="form-msg" id="form-msg" role="status" aria-live="polite" style="margin:14px 0 0"></p>
      <p class="menu-deadline" style="margin-bottom:0">kindly reply by the thirtieth of July</p>
    </div>

  </form>

</main>

<footer class="footer">
  <div class="orn"><span></span></div>
  <p class="footer-line" style="margin:0">We cannot wait to celebrate with you.</p>
  <p class="footer-mark" style="margin-bottom:0">C &amp; A · MMXXVI</p>
</footer>

<script>
  (function () {
    var form = document.getElementById('menu-form');
    var btn = document.getElementById('send-btn');
    var msg = document.getElementById('form-msg');
    var sent = false;

    function complete() {
      return ['starter', 'main', 'dessert'].every(function (c) {
        return form.querySelector('input[name="' + c + '"]:checked');
      }) && form.name.value.trim() !== '';
    }
    function refresh() {
      if (sent) return;
      btn.classList.toggle('btn-waiting', !complete());
    }
    form.addEventListener('change', refresh);
    form.addEventListener('input', refresh);
    refresh();

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      if (sent) return;
      btn.disabled = true;
      btn.classList.remove('btn-waiting');
      btn.textContent = 'Sending…';
      msg.textContent = '';
      fetch(form.action, {
        method: 'POST',
        headers: { 'Accept': 'application/json' },
        body: new FormData(form)
      }).then(function (res) {
        if (!res.ok) throw new Error('submit failed');
        sent = true;
        btn.textContent = 'Choices received';
        msg.textContent = 'Thank you — your choices have been received.';
      }).catch(function () {
        btn.textContent = 'Send my choices';
        btn.disabled = false;
        msg.textContent = 'Something went wrong — please try again, or send your choices to Chelsey or Alex directly.';
      });
    });
  })();
</script>

</body>
</html>
